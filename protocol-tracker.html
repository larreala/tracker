    raw: entry,
    key: key,
    originalKey: entry.key,

    location: meta.location,
    focus: meta.focus,

var WEEKLY_SCHEDULE = { 1: "push", 3: "pull", 5: "legs", 6: "home", 0: "home" };

// Defines the natural order of home workouts. Rotation walks this list, not the calendar.
var HOME_ROTATION = ["home_ski", "home_upper_a", "home_upper_b"];

// Smart fallback: if a recent gym day was missed, suggest a home variant that covers similar muscles.
var MISSED_GYM_FALLBACK = {
  push: "home_upper_a",
  pull: "home_upper_b",
  legs: "home_ski"
};

// Completion-based home rotation: returns the next home key based on the last completed home session.
// Skipping a weekend does NOT advance — only completion advances.
function nextHomeAfter(lastHomeKey) {
  if (!lastHomeKey) return HOME_ROTATION[0];
  var canonical = LEGACY_KEY_MAP[lastHomeKey] || lastHomeKey;
  var idx = HOME_ROTATION.indexOf(canonical);
  if (idx === -1) return HOME_ROTATION[0];
  return HOME_ROTATION[(idx + 1) % HOME_ROTATION.length];
}

// Look backwards through history to find the most recent completed workout matching a predicate.
// Only completed entries should be passed in — history only contains completed sessions.
function findLastCompleted(history, predicate) {
  for (var i = history.length - 1; i >= 0; i--) {
    if (predicate(history[i])) return history[i];
  }
  return null;
}

// Determine which gym categories were missed in the last 7 days based on the weekly schedule.
// Returns the most recent missed category, or null. Used for smart suggestion only.
function findMissedGymCategory(history, today) {
  today = today || new Date();
  var DAY = 86400000;
  var completedRecent = {};
  for (var i = history.length - 1; i >= 0; i--) {
    var entry = normalizeHistoryEntry(history[i]);
    var entryDate = new Date(entry.date);
    var ageDays = (today - entryDate) / DAY;
    if (ageDays > 7) break;
    if (entry.location === "gym") completedRecent[entry.category] = true;
  }
  var dow = today.getDay();
  var checks = [
    { day: 1, cat: "push" },
    { day: 3, cat: "pull" },
    { day: 5, cat: "legs" }
  ];
  var missed = null;
  for (var j = 0; j < checks.length; j++) {
    var c = checks[j];
    var daysSince = (dow - c.day + 7) % 7;
    if (daysSince === 0) daysSince = 7;
    if (daysSince > 0 && daysSince <= 6 && !completedRecent[c.cat]) {
      if (missed === null || daysSince < missed.daysSince) {
        missed = { category: c.cat, daysSince: daysSince };
      }
    }
  }
  return missed ? missed.category : null;
}

// Main resolver: returns the canonical default workout key for a given category.
// Behavior:
//  - "legs"  -> always returns "legs"
//  - "home"  -> next home workout from HOME_ROTATION, based on last completed home (skipping never advances)
//  - "push"  -> alternates pushA/pushB based on last completed push
//  - "pull"  -> alternates pullA/pullB based on last completed pull
function resolveWorkoutKey(category, history) {
  if (category === "legs") return "legs";
  if (category === "home") {
    var lastHome = findLastCompleted(history, function(w) {
      return normalizeHistoryEntry(w).category === "home";
    });
    return nextHomeAfter(lastHome ? lastHome.key : null);
  }
  if (category === "push") {
    var lastPush = findLastCompleted(history, function(w) {
      return normalizeHistoryEntry(w).category === "push";
    });
    if (!lastPush) return "pushA";
    return lastPush.key === "pushA" ? "pushB" : "pushA";
  }
  if (category === "pull") {
    var lastPull = findLastCompleted(history, function(w) {
      return normalizeHistoryEntry(w).category === "pull";
    });
    if (!lastPull) return "pullA";
    return lastPull.key === "pullA" ? "pullB" : "pullA";
  }
  return "pushA";
}

// ============================================================
// STORAGE — localStorage with in-memory fallback if blocked (some sandboxes block it)
// ============================================================
var PREFIX = "ptracker:";
var memStore = {};
var hasLocalStorage = false;
try {
  // Test if localStorage actually works (some sandboxes throw on access)
  var testKey = "__ptracker_test__";
  localStorage.setItem(testKey, "1");
  localStorage.removeItem(testKey);
  hasLocalStorage = true;
} catch (err) {
  hasLocalStorage = false;
}

function load(key) {
  try {
    if (hasLocalStorage) {
      var raw = localStorage.getItem(PREFIX + key);
      return raw ? JSON.parse(raw) : null;
    }
    return memStore[key] || null;
  } catch (err) { return null; }
}
function save(key, val) {
  try {
    if (hasLocalStorage) {
      localStorage.setItem(PREFIX + key, JSON.stringify(val));
    } else {
      memStore[key] = val;
    }
  } catch (err) {}
}

function dateKey(d) {
  d = d || new Date();
  var yr = d.getFullYear();
  var mo = String(d.getMonth() + 1).padStart(2, "0");
  var dy = String(d.getDate()).padStart(2, "0");
  return yr + "-" + mo + "-" + dy;
}
function formatDate(d) {
  d = d || new Date();
  return d.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" });
}

  var whState = useState([]); var workoutHistory = whState[0]; var setWorkoutHistory = whState[1];
  var awState = useState(null); var activeWorkout = awState[0]; var setActiveWorkout = awState[1];
  var invState = useState(INVENTORY_DEFAULTS); var inventory = invState[0]; var setInventory = invState[1];
  var wState = useState([]); var weight = wState[0]; var setWeight = wState[1];
  var csState = useState(null); var cycleStart = csState[0]; var setCycleStart = csState[1];
  var todayKey = dateKey();

  useEffect(function() {
    var t = load("day:" + todayKey); if (t) setToday(t);
    var wh = load("workouts"); if (wh) setWorkoutHistory(wh);
    var inv = load("inventory"); if (inv) setInventory(inv);
    var w = load("weight"); if (w) setWeight(w);
    var cs = load("cycleStart");

    else { save("cycleStart", todayKey); setCycleStart(todayKey); }
    var aw = load("activeWorkout"); if (aw) setActiveWorkout(aw);

    var newChecks = Object.assign({}, today.checks);

    var newToday = Object.assign({}, today, { checks: newChecks });
    setToday(newToday);
    save("day:" + todayKey, newToday);
  }

  function saveWorkout(workout) {
    var newHistory = workoutHistory.concat([Object.assign({}, workout, { date: todayKey })]);
    setWorkoutHistory(newHistory);
    save("workouts", newHistory);
    setActiveWorkout(null);
    save("activeWorkout", null);
  }

  function startWorkout(key, duration) {
    var day = WORKOUT_PLAN[key];
    var exercises = day[duration].map(function(ex, i) {
      var logged = [];
      for (var j = 0; j < ex.sets; j++) logged.push({ weight: "", reps: "", done: false });
      return { id: i, name: ex.name, sets: ex.sets, reps: ex.reps, logged: logged };
    });
    var w = { key: key, name: day.name, type: day.type, duration: duration, exercises: exercises, startTime: Date.now() };
    setActiveWorkout(w);
    save("activeWorkout", w);
    setTab("workout");

    setActiveWorkout(w);
    save("activeWorkout", w);
  }

  else if (tab === "track") content = h(Track, { inventory: inventory, setInventory: setInventory, weight: weight, setWeight: setWeight, workoutHistory: workoutHistory, cycleStart: cycleStart, setCycleStart: setCycleStart });

      navBtn("workout", "💪", "Workout", tab, setTab),
      navBtn("protocol", "💊", "Protocol", tab, setTab),
      navBtn("track", "📊", "Track", tab, setTab)

}

          ex.logged.map(function(set, setIdx) {
            return h("div", { key: setIdx, className: "set-row" },
              h("div", { style: { fontSize: 12, color: "#666", minWidth: 30 } }, "#" + (setIdx + 1)),
              h("input", { type: "number", inputMode: "decimal", className: "set-input", placeholder: "lbs", value: set.weight, onChange: function(ev){ updateSet(exIdx, setIdx, "weight", ev.target.value); } }),
              h("input", { type: "number", inputMode: "numeric", className: "set-input", placeholder: "reps", value: set.reps, onChange: function(ev){ updateSet(exIdx, setIdx, "reps", ev.target.value); } }),
              h("button", { className: set.done ? "set-done-btn" : "set-pending-btn", onClick: function(){ toggleSetDone(exIdx, setIdx); } }, set.done ? "✓ Done" : "Mark")
            );
          })
        );
      })
    ),

    h("div", { style: { padding: 16, display: "flex", gap: 8 } },
      h("button", { className: "btn-success", style: { flex: 2, padding: 14 }, onClick: function(){ saveWorkout(activeWorkout); } }, "Finish Workout"),
      h("button", { className: "btn-secondary", style: { flex: 1 }, onClick: function(){ setTab("home"); } }, "Pause")
    )
  );
}

// ============================================================
// PROTOCOL

    h("div", { className: "header" },

    ),

    h("div", { className: "card" },
      h("div", { className: "card-title" }, "Daily"),
      PROTOCOL.daily.map(function(p) {
        return h("div", { key: p.id, className: "row", onClick: function(){ toggleCheck(p.id); } },
          h("div", { className: "row-label" },
            p.name,
            h("div", { className: "row-detail" }, p.detail)
          ),
          h("div", { className: "checkbox" + (today.checks[p.id] ? " done" : "") }, "✓")
        );
      })
    ),

    h("div", { className: "card" },
      h("div", { className: "card-title" }, "Weekly"),
      PROTOCOL.weekly.map(function(p) {
        return h("div", { key: p.id, className: "row", onClick: function(){ toggleCheck(p.id); } },
          h("div", { className: "row-label" },
            p.name,
            h("div", { className: "row-detail" }, p.detail)
          ),
          h("div", { className: "checkbox" + (today.checks[p.id] ? " done" : "") }, "✓")
        );
      })
    ),

    h("div", { className: "card" },
      h("div", { className: "card-title" }, "Reference"),
      h("div", { style: { fontSize: 13, color: "#aaa", lineHeight: 1.6 } },
        h("p", null, h("strong", { style: { color: "#e5e5e5" } }, "Injection order: "), "Tesa → Ipa"),
        h("p", null, h("strong", { style: { color: "#e5e5e5" } }, "Timing: "), "Bedtime, empty stomach (2-3h post meal)"),
        h("p", null, h("strong", { style: { color: "#e5e5e5" } }, "Site: "), "Abdomen or thigh, rotate daily"),
        h("p", null, h("strong", { style: { color: "#e5e5e5" } }, "NMN: "), "600mg + 500mg-1g TMG with breakfast"),
        h("p", null, h("strong", { style: { color: "#e5e5e5" } }, "Pre-workout: "), "30-40 min before training")
      )
    )
  );
}

// ============================================================
// TRACK
// ============================================================
function Track(props) {
  var inventory = props.inventory, setInventory = props.setInventory;
  var weight = props.weight, setWeight = props.setWeight;
  var workoutHistory = props.workoutHistory;
  var cycleStart = props.cycleStart, setCycleStart = props.setCycleStart;

  var subState = useState("metrics"); var subtab = subState[0]; var setSubtab = subState[1];
  var wiState = useState(""); var weightInput = wiState[0]; var setWeightInput = wiState[1];
  var wsState = useState(""); var waistInput = wsState[0]; var setWaistInput = wsState[1];

  function logWeight() {
    if (!weightInput) return;
    var entry = { date: dateKey(), weight: parseFloat(weightInput), waist: parseFloat(waistInput) || null };
    var newWeight = weight.concat([entry]);
    setWeight(newWeight);
    save("weight", newWeight);
    setWeightInput("");
    setWaistInput("");
  }

  function updateInventory(id, weeksLeft) {
    var newInv = inventory.map(function(i) {
      if (i.id !== id) return i;
      return Object.assign({}, i, { weeksLeft: parseFloat(weeksLeft) || 0 });
    });
    setInventory(newInv);
    save("inventory", newInv);
  }

  function resetCycle() {
    if (!confirm("Reset cycle start to today?")) return;
    var k = dateKey();
    setCycleStart(k);
    save("cycleStart", k);
  }

  var recentWeights = weight.slice(-5).reverse();
  var workoutsThisWeek = workoutHistory.filter(function(w) {
    var d = new Date(w.date);
    var weekAgo = new Date();
    weekAgo.setDate(weekAgo.getDate() - 7);
    return d >= weekAgo;
  }).length;

  var elements = [];
  elements.push(h("div", { key: "header", className: "header" },
    h("div", { className: "header-date" }, "All your data"),
    h("div", { className: "header-title" }, "Track")
  ));

  elements.push(h("div", { key: "tabs", className: "tabs" },
    h("button", { className: "tab" + (subtab === "metrics" ? " active" : ""), onClick: function(){ setSubtab("metrics"); } }, "Metrics"),
    h("button", { className: "tab" + (subtab === "inventory" ? " active" : ""), onClick: function(){ setSubtab("inventory"); } }, "Inventory"),
    h("button", { className: "tab" + (subtab === "stats" ? " active" : ""), onClick: function(){ setSubtab("stats"); } }, "Stats")
  ));

  if (subtab === "metrics") {
    elements.push(h("div", { key: "metrics" },
      h("div", { className: "card" },
        h("div", { className: "card-title" }, "Log Weight / Waist"),
        h("div", { style: { display: "flex", gap: 8 } },
          h("div", { style: { flex: 1 } },
            h("div", { className: "input-label" }, "Weight (lbs)"),
            h("input", { type: "number", inputMode: "decimal", className: "input-field", value: weightInput, onChange: function(ev){ setWeightInput(ev.target.value); } })
          ),
          h("div", { style: { flex: 1 } },
            h("div", { className: "input-label" }, "Waist (in)"),
            h("input", { type: "number", inputMode: "decimal", className: "input-field", value: waistInput, onChange: function(ev){ setWaistInput(ev.target.value); } })
          )
        ),
        h("button", { className: "btn-primary", style: { marginTop: 12, width: "100%" }, onClick: logWeight }, "Log")
      ),
      h("div", { className: "card" },
        h("div", { className: "card-title" }, "Recent Entries"),
        recentWeights.length === 0
          ? h("div", { style: { color: "#666", fontSize: 14 } }, "No entries yet")
          : recentWeights.map(function(w, i) {
              return h("div", { key: i, className: "list-item" },
                h("div", { style: { fontSize: 13, color: "#888" } }, w.date),
                h("div", null,
                  h("span", { style: { fontWeight: 600 } }, w.weight + " lbs"),
                  w.waist ? h("span", { style: { color: "#888", marginLeft: 8 } }, w.waist + "\"") : null
                )
              );
            })
      )
    ));
  } else if (subtab === "inventory") {
    elements.push(h("div", { key: "inv" },
      h("div", { className: "card" },
        h("div", { className: "card-title" }, "Current Stock (weeks left)"),
        inventory.map(function(i) {
          var pct = Math.min(100, (i.weeksLeft / i.totalWeeks) * 100);
          var color = i.weeksLeft <= 1 ? "#dc2626" : (i.weeksLeft <= 2 ? "#f59e0b" : "#16a34a");
          return h("div", { key: i.id, className: "list-item", style: { display: "block" } },
            h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
              h("div", { style: { flex: 1 } },
                h("div", { style: { fontSize: 14, fontWeight: 600 } }, i.name)
              ),
              h("input", { type: "number", inputMode: "decimal", className: "set-input", style: { width: 70 }, value: i.weeksLeft, onChange: function(ev){ updateInventory(i.id, ev.target.value); } })
            ),
            h("div", { className: "inv-bar" },
              h("div", { className: "inv-bar-bg" },
                h("div", { className: "inv-bar-fill", style: { width: pct + "%", background: color } })
              ),
              h("div", { style: { fontSize: 11, color: "#666", minWidth: 60, textAlign: "right" } }, i.weeksLeft + "/" + i.totalWeeks + "w")
            )
          );
        })
      ),
      h("div", { className: "card" },
        h("div", { className: "card-title" }, "Cycle"),
        h("div", { className: "list-item" },
          h("div", null,
            h("div", { style: { fontSize: 14 } }, "Started"),
            h("div", { style: { fontSize: 12, color: "#888" } }, cycleStart || "Not set")
          ),
          h("button", { className: "btn-secondary", onClick: resetCycle }, "Reset")
        )
      )
    ));
  } else if (subtab === "stats") {
    var weightDelta = weight.length >= 2 ? (weight[weight.length-1].weight - weight[0].weight).toFixed(1) : "—";

    // Compute normalized stats once
    var normalized = workoutHistory.map(normalizeHistoryEntry);
    var categoryCounts = { push: 0, pull: 0, legs: 0, home: 0 };
    var homeVariantCounts = { home_ski: 0, home_upper_a: 0, home_upper_b: 0, home_legacy: 0 };
    var focusCounts = { upper: 0, lower: 0, balanced: 0 };
    var locationCounts = { gym: 0, home: 0 };
    for (var nIdx = 0; nIdx < normalized.length; nIdx++) {
      var nEntry = normalized[nIdx];
      if (categoryCounts[nEntry.category] !== undefined) categoryCounts[nEntry.category]++;
      if (nEntry.category === "home") {
        if (homeVariantCounts[nEntry.key] !== undefined) homeVariantCounts[nEntry.key]++;
        else homeVariantCounts.home_legacy++;
      }
      if (focusCounts[nEntry.focus] !== undefined) focusCounts[nEntry.focus]++;
      if (locationCounts[nEntry.location] !== undefined) locationCounts[nEntry.location]++;
    }

    var totalLoggedForBalance = focusCounts.upper + focusCounts.lower;
    var upperPct = totalLoggedForBalance > 0 ? Math.round((focusCounts.upper / totalLoggedForBalance) * 100) : 0;
    var totalLogged = locationCounts.gym + locationCounts.home;
    var gymPct = totalLogged > 0 ? Math.round((locationCounts.gym / totalLogged) * 100) : 0;

    var homeVariantLabels = {
      home_ski: "Home Ski Day",
      home_upper_a: "Home Upper A",
      home_upper_b: "Home Upper B",
      home_legacy: "Home (legacy)"
    };

    elements.push(h("div", { key: "stats" },
      h("div", { className: "card" },
        h("div", { className: "card-title" }, "This Week"),
        h("div", { className: "stat-grid" },
          h("div", { className: "stat-card" },
            h("div", { className: "stat-value" }, workoutsThisWeek),
            h("div", { className: "stat-label" }, "Workouts")
          ),
          h("div", { className: "stat-card" },
            h("div", { className: "stat-value" }, weight.length),
            h("div", { className: "stat-label" }, "Weight logs")
          ),
          h("div", { className: "stat-card" },
            h("div", { className: "stat-value" }, workoutHistory.length),
            h("div", { className: "stat-label" }, "Total workouts")
          ),
          h("div", { className: "stat-card" },
            h("div", { className: "stat-value" }, weightDelta),
            h("div", { className: "stat-label" }, "Weight Δ (lbs)")
          )
        )
      ),
      h("div", { className: "card" },
        h("div", { className: "card-title" }, "Workout Type Breakdown"),
        ["push", "pull", "legs", "home"].map(function(cat) {
          return h("div", { key: cat, className: "list-item" },
            h("div", { style: { textTransform: "capitalize" } }, cat),
            h("div", { style: { fontWeight: 600 } }, categoryCounts[cat])
          );
        })
      ),
      h("div", { className: "card" },
        h("div", { className: "card-title" }, "Home Variants"),
        categoryCounts.home === 0
          ? h("div", { style: { color: "#666", fontSize: 14 } }, "No home workouts logged yet")
          : ["home_ski", "home_upper_a", "home_upper_b", "home_legacy"].map(function(k) {
              if (homeVariantCounts[k] === 0) return null;
              return h("div", { key: k, className: "list-item" },
                h("div", null, homeVariantLabels[k]),
                h("div", { style: { fontWeight: 600 } }, homeVariantCounts[k])
              );
            })
      ),
      h("div", { className: "card" },
        h("div", { className: "card-title" }, "Balance"),
        h("div", { className: "list-item" },
          h("div", null, "Upper / Lower"),
          h("div", { style: { fontWeight: 600 } }, totalLoggedForBalance === 0
            ? "—"
            : (focusCounts.upper + "U · " + focusCounts.lower + "L (" + upperPct + "% upper)")
          )
        ),
        h("div", { className: "list-item" },
          h("div", null, "Gym / Home"),
          h("div", { style: { fontWeight: 600 } }, totalLogged === 0
            ? "—"
            : (locationCounts.gym + "G · " + locationCounts.home + "H (" + gymPct + "% gym)")
          )
        )
      )
    ));
  }

  return h("div", null, elements);
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(h(App));
} catch (renderErr) {
  document.getElementById("root").innerHTML =
    '<div style="padding:24px;color:#dc2626;font-family:system-ui">' +
    '<h2>App failed to load</h2>' +
    '<p style="color:#888">Error: ' + (renderErr.message || renderErr) + '</p>' +
    '<p style="color:#888">Try opening this file in Safari or Chrome on your phone instead of the chat viewer.</p>' +
    '</div>';
}

// ============================================================
// TESTS — lightweight self-checks logged to console on load.
// Wrapped in try/catch so test failures can never break the app.
// ============================================================
try {
(function runTests() {
  var results = [];
  function assert(name, cond) {
    results.push({ name: name, pass: !!cond });
  }
  function makeEntry(key, dateOffsetDays, opts) {
    opts = opts || {};
    var d = new Date(); d.setDate(d.getDate() + dateOffsetDays);
    var ymd = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
    var meta = WORKOUT_META[key] || {};
    return {
      key: key,
      type: opts.type || meta.category || "push",
      name: (WORKOUT_PLAN[key] && WORKOUT_PLAN[key].name) || key,
      date: opts.date || ymd,
      duration: opts.duration || 60,
      exercises: opts.exercises || []
    };
  }

  // Test 1: empty history → home defaults to home_ski
  assert("empty history defaults to home_ski",
    resolveWorkoutKey("home", []) === "home_ski");

  // Test 2: last completed home_ski → next is home_upper_a
  assert("after home_ski, next is home_upper_a",
    resolveWorkoutKey("home", [makeEntry("home_ski", -2)]) === "home_upper_a");

  // Test 3: after home_upper_a, next is home_upper_b
  assert("after home_upper_a, next is home_upper_b",
    resolveWorkoutKey("home", [makeEntry("home_upper_a", -2)]) === "home_upper_b");

  // Test 4: after home_upper_b, wraps back to home_ski
  assert("after home_upper_b, wraps to home_ski",
    resolveWorkoutKey("home", [makeEntry("home_upper_b", -2)]) === "home_ski");

  // Test 5: skipped weekend doesn't advance — only completion advances
  // The "skip" is simulated by simply not adding a new entry. Same history, same suggestion.
  var history1 = [makeEntry("home_ski", -9)];
  var suggestion1 = resolveWorkoutKey("home", history1);
  var suggestion2 = resolveWorkoutKey("home", history1); // call again, no completion happened
  assert("skipped weekend does not advance rotation",
    suggestion1 === "home_upper_a" && suggestion2 === "home_upper_a");

  // Test 6: manual override doesn't mutate state until completion
  // Simulated by calling resolver before and after adding a completed entry of the chosen variant.
  var manualHistory = [makeEntry("home_ski", -10)];
  // User would pick home_upper_b manually but hasn't completed yet
  var beforeManual = resolveWorkoutKey("home", manualHistory);
  assert("before manual completion, default is unchanged",
    beforeManual === "home_upper_a");
  // Now they complete home_upper_b
  manualHistory.push(makeEntry("home_upper_b", -1));
  var afterManual = resolveWorkoutKey("home", manualHistory);
  assert("completed manual home_upper_b becomes new rotation basis (next = home_ski)",
    afterManual === "home_ski");

  // Test 7: legacy "home" key still treated as home_ski for rotation
  var legacyHistory = [makeEntry("home", -3, { type: "home" })];
  // Force the key to be the old "home" not "home_ski"
  legacyHistory[0].key = "home";
  assert("legacy 'home' key normalizes to home_ski for rotation",
    resolveWorkoutKey("home", legacyHistory) === "home_upper_a");

  // Test 8: legacy homeUpperA key works
  var legacyHistory2 = [{ key: "homeUpperA", type: "home", date: "2026-01-01", duration: 60, exercises: [] }];
  assert("legacy 'homeUpperA' normalizes to home_upper_a",
    resolveWorkoutKey("home", legacyHistory2) === "home_upper_b");

  // Test 9: push alternation
  assert("empty history → pushA",
    resolveWorkoutKey("push", []) === "pushA");
  assert("after pushA → pushB",
    resolveWorkoutKey("push", [makeEntry("pushA", -2)]) === "pushB");
  assert("after pushB → pushA",
    resolveWorkoutKey("push", [makeEntry("pushB", -2)]) === "pushA");

  // Test 10: legs always returns legs
  assert("legs always returns legs",
    resolveWorkoutKey("legs", []) === "legs"
    && resolveWorkoutKey("legs", [makeEntry("legs", -2)]) === "legs");

  // Test 11: normalizeHistoryEntry handles legacy entries
  var norm = normalizeHistoryEntry({ key: "home", type: "home", date: "2026-01-01" });
  assert("normalize legacy 'home' → home_ski with home category",
    norm.key === "home_ski" && norm.category === "home" && norm.location === "home");

  // Test 12: WORKOUT_META covers all WORKOUT_PLAN keys (data integrity)
  var planKeys = Object.keys(WORKOUT_PLAN);
  var allCovered = true;
  for (var pk = 0; pk < planKeys.length; pk++) {
    if (!WORKOUT_META[planKeys[pk]]) { allCovered = false; break; }
  }
  assert("WORKOUT_META covers every WORKOUT_PLAN key", allCovered);

  // Summary
  var passed = 0, failed = 0;
  var output = "Protocol Tracker self-tests:\n";
  for (var ri = 0; ri < results.length; ri++) {
    var r = results[ri];
    if (r.pass) passed++; else failed++;
    output += (r.pass ? "  ✓ " : "  ✗ ") + r.name + "\n";
  }
  output += "Results: " + passed + " passed, " + failed + " failed";
  if (failed > 0) console.warn(output);
  else console.log(output);
})();
} catch (testErr) {
  // Tests must never break the app. Log silently.
  try { console.warn("Test runner error: " + testErr.message); } catch (e) {}
}
</script>
